<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #username {
            background-color: rgba(169, 169, 169, 0.312);
            position: relative;
            left: 5px;

        }

        #pass {
             background-color: rgba(169, 169, 169, 0.312);
             position: relative;
             left: 8px;
             top: 1px;

        }
        #sub {
            position: relative;
            left: 100px;
            top: 10px;


        }
    </style>
</head>
<body>

    <form action="/json">

        <label for="username"> Username: </label>

        <input id="username" type="text" placeholder="Enter your username" required="true" > <br>

        <label for="pass">  Password:  </label>
        <input type="password" id="pass" placeholder="Enter your password" required="true"> <br>

        <input type="submit" id="sub">






    </form>
    
</body>
</html>
