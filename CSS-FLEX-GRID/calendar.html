<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calendar </title>
    <style>
        .container {
            display:grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: 30px repeat(5, 80px);
            gap: 20px;
       




        }

        .day {
            background-color: azure;
            /* height: 60px;  */
     
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            border-radius: 15px;

        }

        .day-nam {
            /* height: 60px;  */
     
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: bisque;
            border-radius: 10px;
            font-size: 1.7rem;



        }

        .day:hover {
                    background-color: rgb(31, 207, 207);
        }


        .day-nam:hover {
                     background-color: darksalmon;


        }



    </style>
</head>
<body>

    <div class="container">

        <div class="day-nam">S</div>
        <div class="day-nam">M</div>
        <div class="day-nam">T</div>
        <div class="day-nam">W</div>
        <div class="day-nam">T</div>
        <div class="day-nam">F</div>
        <div class="day-nam">S</div>

        <div class="day"> 28 </div>
