<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Flex Layout </title>
</head>
<body>

 <!-- #sec or div#sec    -->

<div id="sec"></div>

<!-- .class or div.class  -->

<h1 class="class"></h1>

<!-- div>p  -->

<div>
    <p></p>
</div>

<!-- div>p*3  -->

<div>
    <p></p>
    <p></p>
    <p></p>
</div>

<!-- div>section>article  -->


<div>
    <section>
        <article></article>
    </section>
</div>

<!-- div>section*2>article*3  -->

<div>
    <section>
        <article></article>
        <article></article>
        <article></article>
    </section>
    <section>
        <article></article>
        <article></article>
        <article></article>
    </section>
</div>


<div>
    <article></article>
    <article></article>
    <article></article>
    <section>
        <h2></h2>
        <p></p>
    </section>
</div>

<!-- div>article*3>section>h2+p*2  -->

<div>
    <article>
        <section>
            <h2></h2>
            <p></p>
            <p></p>
        </section>
    </article>
    <article>
        <section>
            <h2></h2>
            <p></p>
            <p></p>
        </section>
    </article>
    <article>
        <section>
            <h2></h2>
            <p></p>
            <p></p>
        </section>
    </article>
</div>

<!-- h1{welcome}  -->
<h1>welcome</h1>

<!-- ul>li*5{ item -$ }  -->

<ul>
    <li>item - 1</li>
    <li>item - 2</li>
    <li>item - 3</li>
    <li>item - 4</li>
    <li>item - 5</li>
</ul>

<!-- ul.id>li.clss*3{ item - $}  -->

<ul class="id">
    <li class="clss">item - 1</li>
    <li class="clss">item - 2</li>
    <li class="clss">item - 3</li>
</ul>

<!-- .container>.box*3{box-$}  -->


<div class="container">
    <div class="box">box-1</div>
    <div class="box">box-2</div>
    <div class="box">box-3</div>
</div>

</body>
</html>
