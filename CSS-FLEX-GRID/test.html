<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .con {
            display: grid;
            grid-template-columns: 50px 50px;

        }

        .box {
            height: 50px; width: 50px;
            border: 2px solid lavenderblush;
            background-color: azure;
            display: flex;
            justify-content: center;
            align-items: center;
  

        }

        .week{
               border: 2px solid rosybrown;
               border-radius: 5px;
               display:flex;
               justify-content: center;
               align-items: center;

        }


    </style>

</head>
<body>


    <div class="con">
        <div class="week">s</div>
        <div class="week">m</div>
        <div class="box">1</div>
        <div class="box">2</div>
    </div>
    
</body>
</html>
